services:
  backend:
    environment:
      DJANGO_DEBUG: "true"
      REFRESH_TOKEN_COOKIE_SECURE: "false"
    volumes:
      - ./backend:/app
    command: >
      sh -c "if [ -f manage.py ]; then
      uv run python manage.py migrate &&
      uv run python manage.py runserver 0.0.0.0:8000;
      else
      echo 'Backend project is not bootstrapped yet.' && sleep infinity;
      fi"

  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ -f package.json ]; then
      npm install &&
      npm run dev -- --host 0.0.0.0;
      else
      echo 'Frontend project is not bootstrapped yet.' && sleep infinity;
      fi"

volumes:
  frontend_node_modules:
