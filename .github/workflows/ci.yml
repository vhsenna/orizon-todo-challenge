name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orizon_todo
          POSTGRES_USER: orizon
          POSTGRES_PASSWORD: orizon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orizon -d orizon_todo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SECRET_KEY: ci-production-lite-check-secret-0123456789abcdef0123456789abcdef
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173
      POSTGRES_DB: orizon_todo
      POSTGRES_USER: orizon
      POSTGRES_PASSWORD: orizon
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Install dependencies
        run: uv sync

      - name: Lint backend
        run: uv run ruff check .

      - name: Check Django project
        run: uv run python manage.py check

      - name: Run backend tests
        run: uv run pytest -q

      - name: Check production deployment settings
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DJANGO_ALLOWED_HOSTS: example.com
          DJANGO_CORS_ALLOWED_ORIGINS: https://example.com
          REFRESH_TOKEN_COOKIE_SECURE: "true"
        run: uv run python manage.py check --deploy

      - name: Validate OpenAPI schema
        run: uv run python manage.py spectacular --validate --file /tmp/orizon-schema.yml

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose config

      - name: Build Compose services
        run: docker compose build

  e2e:
    name: Selenium E2E
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orizon_todo
          POSTGRES_USER: orizon
          POSTGRES_PASSWORD: orizon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orizon -d orizon_todo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: change-me-in-development-only-keep-this-secret
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173
      POSTGRES_DB: orizon_todo
      POSTGRES_USER: orizon
      POSTGRES_PASSWORD: orizon
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      VITE_API_BASE_URL: http://localhost:8000/api
      E2E_FRONTEND_URL: http://localhost:5173
      E2E_BACKEND_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: backend/.python-version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Prepare database
        working-directory: backend
        run: uv run python manage.py migrate --noinput

      - name: Start backend
        working-directory: backend
        run: nohup uv run python manage.py runserver 0.0.0.0:8000 > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev -- --host 0.0.0.0 > ../frontend.log 2>&1 &

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -fsS http://localhost:8000/api/health/; do sleep 2; done'
          timeout 60 bash -c 'until curl -fsS http://localhost:5173/login; do sleep 2; done'

      - name: Run e2e tests
        working-directory: backend
        run: uv run pytest ../e2e -q
